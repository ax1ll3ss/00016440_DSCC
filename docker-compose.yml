services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-confessions_db}
      POSTGRES_USER: ${POSTGRES_USER:-confessions_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-confessions_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-confessions_user} -d ${POSTGRES_DB:-confessions_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  web:
    build: .
    restart: always
    volumes:
      - static_volume:/home/appuser/app/staticfiles
      - media_volume:/home/appuser/app/media
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: ${POSTGRES_DB:-confessions_db}
      POSTGRES_USER: ${POSTGRES_USER:-confessions_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-confessions_pass}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/home/appuser/app/staticfiles:ro
      - media_volume:/home/appuser/app/media:ro
    depends_on:
      - web
    networks:
      - app_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  app_network:
    driver: bridge
